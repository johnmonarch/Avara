services:
  web:
    build:
      context: ..
      dockerfile: apps/web-player/Dockerfile
      args:
        VITE_API_BASE_URL: ${PUBLIC_API_URL:-http://localhost:8080}
    environment:
      VITE_API_BASE_URL: ${PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  admin:
    build:
      context: ..
      dockerfile: apps/admin/Dockerfile
      args:
        VITE_API_BASE_URL: ${PUBLIC_API_URL:-http://localhost:8080}
    environment:
      VITE_API_BASE_URL: ${PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "3001:3001"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      PORT: 8080
      MATCHMAKER_URL: http://matchmaker:8090
      GAME_SERVER_URL: ${PUBLIC_GAME_SERVER_URL:-http://localhost:8091}
      POSTGRES_URL: postgres://${POSTGRES_USER:-avara}:${POSTGRES_PASSWORD:-avara}@postgres:5432/${POSTGRES_DB:-avara}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-avara-levels}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  matchmaker:
    build:
      context: ..
      dockerfile: apps/matchmaker/Dockerfile
    environment:
      PORT: 8090
      GAME_SERVER_URL: ${PUBLIC_GAME_SERVER_URL:-http://localhost:8091}
      GAME_WORKERS: game-worker-1|${PUBLIC_GAME_SERVER_URL:-http://localhost:8091}|64
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8090/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  game-server:
    build:
      context: ..
      dockerfile: apps/game-server/Dockerfile
    environment:
      PORT: 8091
      TICK_RATE: 20
    ports:
      - "8091:8091"
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      replicas: 1
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8091/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-avara}
      POSTGRES_USER: ${POSTGRES_USER:-avara}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-avara}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-avara} -d ${POSTGRES_DB:-avara}"]
      interval: 15s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-avara}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-avara-dev-password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9000/minio/health/live >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  minio-data:
