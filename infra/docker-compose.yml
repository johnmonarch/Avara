services:
  web:
    build:
      context: .
      dockerfile: apps/web-player/Dockerfile
      network: host
      args:
        PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080}
        PUBLIC_GAME_SERVER_URL: ${PUBLIC_GAME_SERVER_URL:-http://localhost:8091}
    environment:
      VITE_API_BASE_URL: ${PUBLIC_API_URL:-http://localhost:8080}
      VITE_GAME_SERVER_URL: ${PUBLIC_GAME_SERVER_URL:-http://localhost:8091}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      network: host
      args:
        PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080}
    environment:
      VITE_API_BASE_URL: ${PUBLIC_API_URL:-http://localhost:8080}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      network: host
    environment:
      PORT: 8080
      MATCHMAKER_URL: http://matchmaker:8090
      GAME_SERVER_URL: ${PUBLIC_GAME_SERVER_URL:-http://localhost:8091}
      POSTGRES_URL: postgres://${POSTGRES_USER:-avara}:${POSTGRES_PASSWORD:-avara}@postgres:5432/${POSTGRES_DB:-avara}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-avara-levels}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  matchmaker:
    build:
      context: .
      dockerfile: apps/matchmaker/Dockerfile
      network: host
    environment:
      PORT: 8090
      GAME_SERVER_URL: ${PUBLIC_GAME_SERVER_URL:-http://localhost:8091}
      GAME_WORKERS: game-worker-1|${PUBLIC_GAME_SERVER_URL:-http://localhost:8091}|64
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8090/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  game-server:
    build:
      context: .
      dockerfile: apps/game-server/Dockerfile
      network: host
    environment:
      PORT: 8091
      TICK_RATE: 20
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      replicas: 1
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8091/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-avara}
      POSTGRES_USER: ${POSTGRES_USER:-avara}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-avara}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-avara} -d ${POSTGRES_DB:-avara}"]
      interval: 15s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-avara}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-avara-dev-password}
    volumes:
      - minio-data:/data
    healthcheck:
      disable: true

volumes:
  postgres-data:
  minio-data:
